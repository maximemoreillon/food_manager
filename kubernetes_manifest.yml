apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${K8S_RESOURCE_NAME}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ${K8S_RESOURCE_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${K8S_RESOURCE_NAME}
    spec:
      containers:
        - name: ${K8S_RESOURCE_NAME}
          image: ${CONTAINER_IMAGE_TAGGED}
          env:
            - name: S3_BUCKET
              value: food-manager
            - name: S3_ENDPOINT
              value: minio.minio
            - name: S3_PORT
              value: "9000"
            - name: S3_REGION
              value: home
            - name: NUXT_PUBLIC_AUTH_REQUIRED
              value: "true"
          envFrom:
            - secretRef:
                name: food-manager-env-from-vault
          resources: {}

---
apiVersion: v1
kind: Service
metadata:
  name: ${K8S_RESOURCE_NAME}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: ${K8S_RESOURCE_NAME}
  ports:
    - port: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${K8S_RESOURCE_NAME}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt

    nginx.ingress.kubernetes.io/proxy-body-size: 5g
    nginx/client_max_body_size: 5g

    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Food manager
    gethomepage.dev/icon: mdi-food
    gethomepage.dev/group: 1P
spec:
  tls:
    - hosts:
        - ${K8S_INGRESS_HOST}
      secretName: ${K8S_RESOURCE_NAME}-tls
  rules:
    - host: ${K8S_INGRESS_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${K8S_RESOURCE_NAME}
                port:
                  number: 80
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: food-manager-env
spec:
  refreshInterval: 5m0s
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: food-manager-env-from-vault
    creationPolicy: Orphan
  dataFrom:
    - extract:
        key: food-manager
    - extract:
        key: openai
  data:
    # S3
    - secretKey: S3_ACCESS_KEY_ID
      remoteRef:
        key: minio-main-access-keys
        property: ACCESS_KEY_ID
    - secretKey: S3_SECRET_ACCESS_KEY
      remoteRef:
        key: minio-main-access-keys
        property: SECRET_ACCESS_KEY
    # OIDC
    - secretKey: NUXT_OAUTH_OIDC_CLIENT_ID
      remoteRef:
        key: keycloak-main-client
        property: CLIENT_ID
    - secretKey: NUXT_OAUTH_OIDC_CLIENT_SECRET
      remoteRef:
        key: keycloak-main-client
        property: CLIENT_SECRET
    - secretKey: NUXT_OAUTH_OIDC_OPENID_CONFIG
      remoteRef:
        key: keycloak-main-client
        property: OPENID_CONFIG
